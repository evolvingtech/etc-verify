[[lean_lib]]
name = "ETCVerify"

# ---------------------------------------------------------------------------
# Mathlib activation point.
#
# Mathlib is not currently a dependency. Substrate v0.1 uses only Lean core
# types and Prop, which is sufficient for the contract algebra and its
# operators (Sequential, SharedResource, Refinement, Conformance).
#
# Trigger conditions for activation:
#   - Timed extensions (Timed.lean) introducing real-valued time, interval
#     reasoning, or tactic-heavy proofs (linarith, omega-style).
#   - SharedResource instantiations needing ordered field / ordered
#     commutative monoid structure on the resource type R.
#   - Any module that would otherwise reinvent algebraic hierarchy already
#     present in Mathlib.Order or Mathlib.Algebra.
#
# Version coordination: the Mathlib rev MUST match lean-toolchain.
# Mathlib release tags and the lean-toolchain pin both use the v-prefix.
#   Current pin:  Lean v4.28.0  -> Mathlib v4.28.0
#   Planned next: Lean v4.29.0  -> Mathlib v4.29.0
# Update both files in the same commit when upgrading.
#
# Activation: uncomment the block below, run `lake update`, then
# `lake build` to confirm. After activation, add `import Mathlib.X` only
# in the specific modules that need it; do not bulk-import in Core or
# existing Operators files.
#
# [[require]]
# name = "mathlib"
# scope = "leanprover-community"
# git = "https://github.com/leanprover-community/mathlib4.git"
# rev = "v4.28.0"
# ---------------------------------------------------------------------------