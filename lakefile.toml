name = "ETCVerify"
defaultTargets = ["ETCVerify"]

[[lean_lib]]
name = "ETCVerify"

# ---------------------------------------------------------------------------
# Mathlib activation point.
#
# Mathlib is not currently a dependency. The substrate through v0.2.x uses
# only Lean core types and Prop, which is sufficient for the contract
# algebra and its operators (Sequential, SharedResource, Refinement, Conformance).
#
# Trigger conditions for activation:
#   - A downstream package instantiating a concrete real-valued/rational time
#     type for Timed T (the v0.2.x Timed modality is abstract over T and stays
#     Lean-core), or a future richer-than-latency timing increment (validity
#     windows, intervals).
#   - SharedResource instantiations needing ordered field / ordered
#     commutative monoid structure on the resource type R.
#   - Any module that would otherwise reinvent algebraic hierarchy already
#     present in Mathlib.Order or Mathlib.Algebra.
#
# Version coordination: the Mathlib rev MUST match lean-toolchain.
# Mathlib release tags and the lean-toolchain pin both use the v-prefix.
#   The active Lean pin lives in lean-toolchain; keep the Mathlib rev
#   (when activated) matched to whatever version that file specifies.
# Update both files in the same commit when upgrading.
#
# Activation: uncomment the block below, run `lake update`, then
# `lake build` to confirm. After activation, add `import Mathlib.X` only
# in the specific modules that need it; do not bulk-import in Core or
# existing Operators files.
#
# [[require]]
# name = "mathlib"
# scope = "leanprover-community"
# git = "https://github.com/leanprover-community/mathlib4.git"
# rev = "v4.29.0"
# ---------------------------------------------------------------------------